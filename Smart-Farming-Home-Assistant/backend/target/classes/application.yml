server:
  port: 3000

spring:
  datasource:
    url: jdbc:h2:mem:smartfarming;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: SmartFarmingHomeAssistant2024SecretKeyForJWTTokenGeneration!@#$%
  expiration: 86400000

app:
  upload-dir: ./uploads

logging:
  level:
    com.smartfarming: DEBUG
